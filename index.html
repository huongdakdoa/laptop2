<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Surface Store - Bản Sửa Lỗi Tuyệt Đối</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; }
        .product-list { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .card { background: #222; border: 1px solid #333; padding: 20px; border-radius: 10px; width: 200px; }
        .price { color: #00a4ef; font-weight: bold; margin: 10px 0; }
        button { background: #0078d4; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background: #005a9e; }
        .cart-status { margin-bottom: 30px; background: #333; padding: 15px; border-radius: 10px; }
        #cart-count { font-size: 20px; color: #ff6b7a; font-weight: bold; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: green; color: white; padding: 10px 20px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Surface Store Vietnam</h1>
        
        <div class="cart-status">
            🛒 Giỏ hàng của bạn: <span id="cart-count">0</span> sản phẩm
            <br>
            <small>(Bấm nút thêm bên dưới để thử)</small>
        </div>

        <div class="product-list">
            <div class="card">
                <h3>Surface Pro 9</h3>
                <p class="price">25.000.000đ</p>
                <button onclick="addToCart('Surface Pro 9')">Thêm vào giỏ</button>
            </div>
            <div class="card">
                <h3>Surface Laptop 5</h3>
                <p class="price">22.000.000đ</p>
                <button onclick="addToCart('Surface Laptop 5')">Thêm vào giỏ</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Đã thêm vào giỏ hàng thành công!</div>

    <script>
        // Khởi tạo số lượng từ bộ nhớ máy (nếu có)
        let count = parseInt(localStorage.getItem('cart_count')) || 0;
        document.getElementById('cart-count').innerText = count;

        function addToCart(name) {
            // 1. Tăng số lượng
            count++;
            
            // 2. Cập nhật hiển thị lên màn hình ngay lập tức
            document.getElementById('cart-count').innerText = count;
            
            // 3. Lưu vào bộ nhớ trình duyệt
            localStorage.setItem('cart_count', count);
            
            // 4. Hiển thị thông báo nhỏ
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);

            console.log("Đã thêm thành công: " + name);
        }
    </script>
</body>
</html>
