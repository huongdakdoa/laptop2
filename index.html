<!doctype html>
<html lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surface Store Vietnam</title>
    <script src="/_sdk/element_sdk.js"></script>
    <script src="/_sdk/data_sdk.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Các style giữ nguyên theo nguồn [3-17] */
        * { box-sizing: border-box; }
        html, body, .app-root { height: 100%; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0f; color: #e8e8f0; }
        .app-root { overflow-y: auto; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-card { background: rgba(255,255,255,0.04); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.07); transition: all 0.3s ease; }
        .glass-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(0,120,212,0.4); transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,120,212,0.15); }
        .hero-bg { background: linear-gradient(135deg, #0a0a0f 0%, #0d1b2e 40%, #0a1628 70%, #0a0a0f 100%); position: relative; overflow: hidden; }
        .ms-blue { color: #0078d4; }
        .gradient-text { background: linear-gradient(135deg, #0078d4, #50c8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-primary { background: linear-gradient(135deg, #0078d4, #106ebe); border: none; color: white; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .btn-secondary { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: #e8e8f0; padding: 10px 24px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #13131f; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; width: 100%; max-width: 560px; max-height: 90%; overflow-y: auto; }
        .floating-zalo { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, #0084ff, #006fe6); border-radius: 16px; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; box-shadow: 0 8px 24px rgba(0, 132, 255, 0.4); z-index: 50; border: none; padding: 12px 16px; color: white; font-weight: 600; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background: #ff6b7a; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; border: 1px solid rgba(0,200,100,0.3); border-radius: 10px; padding: 14px 20px; color: #e8e8f0; z-index: 200; }
    </style>
</head>
<body>
<div class="app-root" id="app">
    <!-- Giao diện HTML giữ nguyên theo nguồn [1, 18-47] -->
    <header class="glass sticky top-0 z-50">
        <div style="max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;">
            <div style="display:flex;align-items:center;gap:12px;">
                <svg width="22" height="22" viewBox="0 0 21 21" fill="none"><rect x="0" y="0" width="10" height="10" fill="#f25022" /><rect x="11" y="0" width="10" height="10" fill="#7fba00" /><rect x="0" y="11" width="10" height="10" fill="#00a4ef" /><rect x="11" y="11" width="10" height="10" fill="#ffb900" /></svg>
                <span id="nav-store-title" style="font-weight:700;font-size:18px;">Surface Store</span>
            </div>
            <nav style="display:flex;gap:28px;align-items:center;">
                <a href="#products" class="nav-link">Sản phẩm</a>
                <button class="cart-icon-btn" onclick="openCart()" style="position:relative;background:none;border:none;cursor:pointer;color:white;">
                    <i data-lucide="shopping-cart"></i>
                    <span class="cart-badge" id="cart-count" style="display:none;">0</span>
                </button>
            </nav>
        </div>
    </header>

    <section id="products" style="max-width:1200px;margin:0 auto;padding:60px 24px;">
        <div id="products-loading" style="text-align:center;padding:40px;"><p>Đang tải sản phẩm...</p></div>
        <div id="product-grid" style="display:none;">
            <div id="products-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;"></div>
        </div>
    </section>

    <!-- Nút Zalo [38] -->
    <button class="floating-zalo" id="zalo-btn" onclick="openZalo()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>0984 026 995</span>
    </button>

    <!-- Modal Chi tiết Sản phẩm [1, 39, 40] -->
    <div id="product-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
                <h2 style="font-size:20px;font-weight:700;">Chi tiết sản phẩm</h2>
                <button onclick="closeModal()">✕</button>
            </div>
            <div id="modal-content"></div>
            <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px;">
                <button class="btn-secondary" onclick="closeModal()">Đóng</button>
                <button class="btn-primary" onclick="addToCartFromModal()">Thêm vào giỏ</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Khởi tạo biến toàn cục [48]
    let allProducts = [];
    let cartData = [];
    let currentProductDetail = null;
    const GOOGLE_SHEETS_URL = 'https://docs.google.com/spreadsheets/d/1X5B9QzyQfkUgXcKaWVipxxRN2eWKkJdhN2J0DFLoIb4/export?format=csv';
    const defaultConfig = { zalo_phone: '0984026995' };

    // SDK Initialization [49]
    async function initSDKs() {
        await window.dataSdk.init({ onDataChanged(data) { cartData = data; updateCartUI(); } });
        window.elementSdk.init({ defaultConfig, onConfigChange: () => {} });
    }
    initSDKs();

    // --- SỬA LỖI NÚT "THÊM VÀO GIỎ" TRONG MODAL ---
    // Trước đó hàm này bị thiếu khiến nút bấm "trơ ra" [1]
    function addToCartFromModal() {
        if (currentProductDetail) {
            addProductToCart(
                currentProductDetail.name, 
                currentProductDetail.category, 
                currentProductDetail.price
            );
            closeModal(); // Đóng modal sau khi thêm thành công
        }
    }

    // Hàm thêm vào giỏ hàng chung [50]
    async function addProductToCart(name, category, price) {
        const existingItem = cartData.find(item => item.product_name === name);
        if (existingItem) {
            const updated = { ...existingItem, quantity: existingItem.quantity + 1 };
            await window.dataSdk.update(updated);
            showToast('✅ Đã cập nhật số lượng');
        } else {
            await window.dataSdk.create({ product_name: name, category, price, quantity: 1, added_at: new Date().toISOString() });
            showToast('✅ Đã thêm vào giỏ hàng');
        }
    }

    // --- SỬA LỖI NÚT "CHAT ZALO" ---
    // Xử lý loại bỏ khoảng trắng trong số điện thoại để link hoạt động đúng [2]
    function openZalo() {
        const phoneRaw = (window.elementSdk?.config?.zalo_phone) || defaultConfig.zalo_phone;
        // Loại bỏ mọi khoảng trắng để tạo link zalo.me chuẩn
        const cleanPhone = phoneRaw.toString().replace(/\s+/g, '');
        window.open(`https://zalo.me/${cleanPhone}`, '_blank', 'noopener,noreferrer');
    }

    // Các hàm phụ trợ khác [2, 50-93]
    function formatPrice(n) { return Number(n).toLocaleString('vi-VN') + ' ₫'; }
    
    function renderProducts() {
        const container = document.getElementById('products-cards');
        container.innerHTML = allProducts.map((p, idx) => `
            <div class="glass-card" style="padding:16px; border-radius:12px; cursor:pointer;" onclick="viewDetails(${idx})">
                <h3 style="font-weight:700;">${p.name}</h3>
                <p style="color:#50c8ff; font-weight:700;">${formatPrice(p.price)}</p>
                <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="event.stopPropagation(); addProductToCart('${p.name}', '${p.category}', ${p.price})">Thêm vào giỏ</button>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function viewDetails(idx) {
        const p = allProducts[idx];
        currentProductDetail = p; // Lưu vào biến toàn cục để hàm addToCartFromModal sử dụng [64]
        document.getElementById('modal-content').innerHTML = `
            <p><strong>Tên:</strong> ${p.name}</p>
            <p><strong>Cấu hình:</strong> ${p.specs || 'N/A'}</p>
            <p><strong>Giá:</strong> <span style="color:#50c8ff;">${formatPrice(p.price)}</span></p>
        `;
        document.getElementById('product-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('product-modal').style.display = 'none'; currentProductDetail = null; }

    function updateCartUI() {
        const count = cartData.reduce((sum, item) => sum + item.quantity, 0);
        const badge = document.getElementById('cart-count');
        badge.textContent = count;
        badge.style.display = count > 0 ? 'flex' : 'none';
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function loadFromGoogleSheets() {
        try {
            const res = await fetch(GOOGLE_SHEETS_URL);
            const text = await res.text();
            const lines = text.split('\n').slice(1);
            allProducts = lines.map(line => {
                const cols = line.split(',');
                return { name: cols, category: cols[94], price: parseFloat(cols[3]), specs: cols[6] };
            }).filter(p => p.name);
            document.getElementById('products-loading').style.display = 'none';
            document.getElementById('product-grid').style.display = 'block';
            renderProducts();
        } catch (e) { console.error(e); }
    }

    window.addEventListener('DOMContentLoaded', loadFromGoogleSheets);
</script>
</body>
</html>
